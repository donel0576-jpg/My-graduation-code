server:
  port: 9999

# 数据库配置（不要在仓库中存放明文敏感信息）
# 推荐在运行环境中通过环境变量/CI secrets/Docker secrets 注入数据库密码等敏感信息。
spring:
  profiles:
    # 可通过 SPRING_PROFILES_ACTIVE 环境变量覆盖（默认 dev）
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 默认本地开发 URL，可通过环境变量 SPRING_DATASOURCE_URL 覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/code2025?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    # 默认用户名（仅开发），生产环境请通过环境变量覆盖
    username: ${SPRING_DATASOURCE_USERNAME:root}
    # 请在运行环境中设置 SPRING_DATASOURCE_PASSWORD，切勿在源码中写明明文密码
    password: ${SPRING_DATASOURCE_PASSWORD:}
    # HikariCP 连接池配置（Spring Boot 默认使用 Hikari）
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
      pool-name: HikariCP

# MyBatis 配置（映射 xml 文件位置与基础配置）
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 在开发环境打印 SQL，生产环境建议降低日志级别并使用 slf4j/logback
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
